spring:
  application:
    name: ecommerce-simulation-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
    username: ${DB_USERNAME:ecommerce_user}
    password: ${DB_PASSWORD:ecommerce_pass}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  auth:
    password-reset-request-cooldown-seconds: ${PASSWORD_RESET_REQUEST_COOLDOWN_SECONDS:60}
    cookie:
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      domain: ${AUTH_COOKIE_DOMAIN:}
  jwt:
    # Zorunlu: env variable olarak set edilmeli, burada default değer YOK.
    secret: ${JWT_SECRET}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  frontend:
    reset-password-url: ${FRONTEND_RESET_PASSWORD_URL:http://localhost:3000/reset-password}
  security:
    csrf-enabled: ${CSRF_ENABLED:true}
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    csrf:
      enabled: true
      cookie-name: ECOMMERCE-XSRF-TOKEN
      header-name: X-XSRF-TOKEN
